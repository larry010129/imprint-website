<section class="auth-section" id="view-register">
  <div class="auth-card">
    <h1>加入會員</h1>
    <p class="sub">註冊會員即可查詢您的訂製進度、保留聯絡資料，讓顧問更快為您服務。</p>
    <form id="registerForm" novalidate>
      <div class="form-field">
        <label for="rName">姓名 <span class="req">*</span></label>
        <input type="text" id="rName" name="fullName" autocomplete="name" required>
      </div>
      <div class="form-field">
        <label for="rPhone">電話 <span class="req">*</span></label>
        <input type="tel" id="rPhone" name="phone" autocomplete="tel" required>
      </div>
      <div class="form-field">
        <label for="rEmailLocal">Email <span class="req">*</span></label>
        <div class="email-split">
          <input type="text" id="rEmailLocal" autocomplete="username" inputmode="email" spellcheck="false" placeholder="使用者名稱" required>
          <span class="email-at" aria-hidden="true">@</span>
          <select id="rEmailDomain" aria-label="Email 網域">
            <option value="gmail.com">gmail.com</option>
            <option value="yahoo.com.tw">yahoo.com.tw</option>
            <option value="hotmail.com">hotmail.com</option>
            <option value="outlook.com">outlook.com</option>
            <option value="icloud.com">icloud.com</option>
            <option value="yahoo.com">yahoo.com</option>
            <option value="__custom__">其他</option>
          </select>
        </div>
        <input type="text" id="rEmailDomainCustom" class="email-domain-custom" placeholder="example.com" hidden autocomplete="off">
        <input type="hidden" id="rEmail" name="email">
      </div>
      <div class="form-field">
        <label for="rStore">店家 / 廠商名稱</label>
        <input type="text" id="rStore" name="storeName" autocomplete="organization" placeholder="合作廠商請填寫">
      </div>
      <div class="form-field">
        <label for="rInvite">邀請碼</label>
        <input type="text" id="rInvite" name="inviteCode" autocomplete="off" spellcheck="false" placeholder="向管理員索取">
        <p class="field-hint">合作廠商註冊請輸入管理員提供的邀請碼。</p>
      </div>
      <div class="form-field">
        <label for="rPassword">密碼（至少 6 碼） <span class="req">*</span></label>
        <input type="password" id="rPassword" name="password" autocomplete="new-password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-dark" id="registerSubmitBtn">建立會員帳號</button>
      <p class="form-msg" id="registerFormMsg" role="status" aria-live="polite"></p>
    </form>
    <p class="switch-link">已經是會員了？<a href="login.html">直接登入</a></p>
  </div>
</section>
