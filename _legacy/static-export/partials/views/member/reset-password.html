<section class="auth-section" id="view-reset-password">
  <div class="auth-card">
    <h1>重設密碼</h1>
    <p class="sub">請輸入您的新密碼。</p>
    <form id="resetPasswordForm" novalidate>
      <div class="form-field">
        <label for="rpPassword">新密碼 <span class="req">*</span></label>
        <input type="password" id="rpPassword" name="password" autocomplete="new-password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-dark" id="resetSubmitBtn">重設密碼</button>
      <p class="form-msg" id="resetFormMsg" role="status" aria-live="polite"></p>
    </form>
    <p class="switch-link"><a href="login.html">回登入頁</a></p>
  </div>
</section>
