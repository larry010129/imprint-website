<meta charset="utf-8">
<script>window.imgFallback=function(img){var s=img.dataset.fbStep?parseInt(img.dataset.fbStep,10):0;var e=["jpg","png","jpeg"];var pic=img.parentElement&&img.parentElement.tagName==="PICTURE"?img.parentElement:null;if(s<e.length-1){s++;img.dataset.fbStep=String(s);if(pic){var srcs=pic.querySelectorAll("source");for(var i=0;i<srcs.length;i++){srcs[i].remove();}}img.src=img.src.replace(/\.(jpg|jpeg|png)(\?.*)?$/i,"."+e[s]+"$2");}else{(pic||img).remove();}};</script>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- @component partials/view-cart.html -->
<section class="page-section member-app" id="mvc-cart" aria-label="購物車">
  <div class="container">
    <div class="price-reference member-panel">
      <div class="price-reference-head">
        <p class="eyebrow">SHOP</p>
        <h1 class="price-reference-title">購物車</h1>
        <p class="price-reference-lead">勾選品項後送出訂單，未勾選的品項會保留在購物車。</p>
      </div>

      <div class="member-state hidden" id="cart-loading">載入中…</div>

      <div class="hidden" id="cart-list-wrap">
        <div class="member-cart-toolbar">
          <label><input type="checkbox" id="cart-select-all" checked> 全選</label>
        </div>
        <ul class="member-cart-list" id="cart-list"></ul>
        <div class="member-cart-summary">
          <div class="member-cart-summary__row">
            <span id="cart-selected-label">已選 0 件</span>
            <strong id="cart-selected-total">NT$ 0</strong>
          </div>
          <button type="button" class="btn btn-dark" id="cart-checkout-btn">訂購已選品項</button>
          <a href="shop/calculator/index.html" class="member-cart-continue">繼續選購</a>
        </div>
      </div>

      <div class="member-state member-state--empty hidden" id="cart-empty">
        <p>購物車目前是空的。</p>
        <a href="shop/calculator/index.html" class="btn btn-mint">前往品項訂製</a>
      </div>
    </div>
  </div>
</section>

<dialog class="member-dialog" id="cart-detail-dialog" aria-labelledby="cart-detail-title">
  <div class="member-dialog__inner">
    <header class="member-dialog__header">
      <h2 id="cart-detail-title">品項明細</h2>
      <button type="button" class="member-dialog__close" id="cart-detail-close" aria-label="關閉">&times;</button>
    </header>
    <div id="cart-detail-body"><p class="member-state">載入中…</p></div>

</dialog>
