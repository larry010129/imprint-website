name: Update gold quote

on:
  schedule:
    # 08:00–22:00 Taipei, hourly (UTC 0–14)
    - cron: '0 0-14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend parser deps
        run: npm install --prefix backend cheerio@^1.0.0

      - name: Fetch latest BOT gold quote
        run: node scripts/fetch-gold-quote.mjs

      - name: Commit updated quote files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gold-quote.json js/gold-quote-data.js
          git diff --staged --quiet || git commit -m "chore: update BOT gold quote fallback"
          git push
