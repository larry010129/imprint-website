name: Update gold quote

on:
  schedule:
    # 08:00–22:00 Taipei, hourly (UTC 0–14)
    - cron: '0 0-14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Fetch latest BOT gold quote
        run: python scripts/fetch_gold_quote.py

      - name: Commit updated quote files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gold-quote.json js/gold-quote-data.js
          git diff --staged --quiet || git commit -m "chore: update BOT gold quote fallback"
          git push
