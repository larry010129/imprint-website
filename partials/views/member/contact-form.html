<section class="contact-section" style="padding-top:0;" id="view-contact-form">
  <div class="container">
    <div class="contact-card contact-form-card" style="max-width:640px;margin:0 auto;">
      <h3>線上留言諮詢</h3>
      <p style="font-size:13px;color:var(--ink-faint);line-height:1.8;margin-bottom:22px;">
        不方便打電話或加 LINE 也沒關係，留下您的聯絡方式與需求，顧問會盡快與您聯繫。
      </p>
      <form id="contactForm" novalidate>
        <div class="form-field">
          <label for="cName">姓名 <span class="req">*</span></label>
          <input type="text" id="cName" name="name" autocomplete="name" required>
        </div>
        <div class="form-field">
          <label for="cPhone">電話 <span class="req">*</span></label>
          <input type="tel" id="cPhone" name="phone" autocomplete="tel" required>
        </div>
        <div class="form-field">
          <label for="cEmail">Email</label>
          <input type="email" id="cEmail" name="email" autocomplete="email">
        </div>
        <div class="form-field">
          <label for="cMessage">您的需求 <span class="req">*</span></label>
          <textarea id="cMessage" name="message" rows="4" required></textarea>
        </div>
        <button type="submit" class="btn btn-dark" id="contactSubmitBtn">送出留言</button>
        <p class="form-msg" id="contactFormMsg" role="status" aria-live="polite"></p>
      </form>
    </div>
  </div>
</section>
