# Render Blueprint — Python Web Service (static site + /api/bot-gold)
# After push: Dashboard → Blueprints → Sync (updates runtime + build/start commands)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: imprint-diamond
    runtime: python
    plan: free
    buildCommand: bash scripts/render-build.sh
    startCommand: gunicorn server.main:app -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /gold-price.html
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: NO_OPEN
        value: "1"
