# Render — Node web service (static site + /api/bot-gold for live BOT gold quotes)
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: imprint-diamond
    runtime: node
    plan: free
    buildCommand: npm install && npm install --prefix backend
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NO_OPEN
        value: "1"
