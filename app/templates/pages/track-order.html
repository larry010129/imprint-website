{% extends "base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/member-app.css?v=1">
{% endblock %}
{% block content %}
<!-- @component partials/view-track-order.html -->
<section class="auth-section" id="view-track-order">
  <div class="auth-card" style="max-width:480px;">
    <h1>查詢訂製進度</h1>
    <p class="sub">輸入顧問提供的訂單編號與您的聯絡電話，即可查詢目前進度，不需要註冊會員。</p>
    <form id="trackForm" novalidate>
      <div class="form-field">
        <label for="tOrderNumber">訂單編號 <span class="req">*</span></label>
        <input type="text" id="tOrderNumber" name="orderNumber" placeholder="例如 IMP-20260714-0001" required>
      </div>
      <div class="form-field">
        <label for="tPhone">聯絡電話 <span class="req">*</span></label>
        <input type="tel" id="tPhone" name="phone" autocomplete="tel" required>
      </div>
      <button type="submit" class="btn btn-dark" id="trackSubmitBtn">查詢進度</button>
      <p class="form-msg" id="trackFormMsg" role="status" aria-live="polite"></p>
    </form>
    <div class="order-result" id="orderResult"></div>
    <p class="switch-link">已經是會員？<a href="/login.html">登入查看全部訂單</a></p>
  </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script src="/static/js/order-status.js"></script>
<script src="/static/js/api-client.js"></script>
<script src="/static/js/mvc/core.js"></script>
<script src="/static/js/mvc/models/track-order-model.js"></script>
<script src="/static/js/mvc/views/track-order-view.js"></script>
<script src="/static/js/mvc/controllers/track-order-controller.js"></script>
{% endblock %}
