{% extends "base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/member-app.css?v=1">
{% endblock %}
{% block content %}
<!-- @component partials/view-reset-password.html -->
<section class="auth-section" id="view-reset-password">
  <div class="auth-card">
    <h1>重設密碼</h1>
    <p class="sub">請輸入您的新密碼。</p>
    <form id="resetPasswordForm" novalidate>
      <div class="form-field">
        <label for="rpPassword">新密碼 <span class="req">*</span></label>
        <input type="password" id="rpPassword" name="password" autocomplete="new-password" required minlength="6">
      </div>
      <button type="submit" class="btn btn-dark" id="resetSubmitBtn">重設密碼</button>
      <p class="form-msg" id="resetFormMsg" role="status" aria-live="polite"></p>
    </form>
    <p class="switch-link"><a href="/login.html">回登入頁</a></p>
  </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script src="/static/js/api-client.js"></script>
<script src="/static/js/mvc/core.js"></script>
<script src="/static/js/mvc/models/reset-password-model.js"></script>
<script src="/static/js/mvc/views/reset-password-view.js"></script>
<script src="/static/js/mvc/controllers/reset-password-controller.js"></script>
{% endblock %}
