{% extends "base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/member-app.css?v=1">
{% endblock %}
{% block content %}
<!-- @component partials/view-favorites.html -->
<section class="page-section member-app" id="mvc-favorites" aria-label="收藏款式">
  <div class="container">
    <div class="price-reference member-panel">
      <div class="price-reference-head">
        <p class="eyebrow">SAVED</p>
        <h1 class="price-reference-title">收藏款式</h1>
        <p class="price-reference-lead">快速載入常用配置，並以目前金價重新試算。</p>
      </div>
      <div class="member-state" id="favorites-loading">載入中…</div>
      <div class="member-favorites-grid hidden" id="favorites-grid"></div>
    </div>
  </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script src="/static/js/api-client.js"></script>
<script src="/static/js/mvc/core.js"></script>
<script src="/static/js/mvc/models/favorites-model.js"></script>
<script src="/static/js/mvc/views/favorites-view.js"></script>
<script src="/static/js/mvc/controllers/favorites-controller.js"></script>
{% endblock %}
