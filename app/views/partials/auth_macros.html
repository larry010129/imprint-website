{% macro auth_shell() %}
<div class="login-container light" id="authContainer" data-auth-container>
  <canvas class="particles-canvas" aria-hidden="true" data-auth-particles></canvas>

  <a href="/" class="back-home">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m15 18-6-6 6-6"/></svg>
    返回首頁
  </a>

  <button type="button" class="theme-toggle" data-auth-theme-toggle aria-label="切換深色模式">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" data-auth-theme-icon-moon><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" data-auth-theme-icon-sun hidden><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>
  </button>

  <div class="login-card">
    <div class="login-card-inner">
      {{ caller() }}
    </div>
  </div>
</div>
{% endmacro %}

{% macro auth_password_field(id, label='密碼', autocomplete='current-password', minlength=None, name='password') %}
<div class="form-field">
  <input type="password" id="{{ id }}" name="{{ name }}" placeholder=" " autocomplete="{{ autocomplete }}"{% if minlength %} minlength="{{ minlength }}"{% endif %} required>
  <label for="{{ id }}">{{ label }}</label>
  <button type="button" class="toggle-password" data-auth-toggle-password aria-label="顯示密碼">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" data-auth-eye-icon><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" data-auth-eye-off-icon hidden><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
  </button>
</div>
{% endmacro %}
