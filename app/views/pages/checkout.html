{% extends "layouts/base.html" %}

{% block extra_css %}
<link rel="stylesheet" href="/static/css/member-app.css?v=1">
{% include "partials/checkout-react-css.html" %}
<link rel="stylesheet" href="/static/css/checkout-page.css?v=8">
{% endblock %}

{% block content %}

<section class="page-section member-app checkout-page" aria-label="確認訂單">
  <div class="container checkout-container">

    <nav class="checkout-stepper" aria-label="結帳步驟">
      <div class="checkout-stepper-step is-done">
        <span class="checkout-stepper-bar" aria-hidden="true"></span>
        <a class="checkout-stepper-label" href="/cart.html">購物車</a>
      </div>
      <div class="checkout-stepper-step is-active">
        <span class="checkout-stepper-bar" aria-hidden="true"></span>
        <span class="checkout-stepper-label">確認訂單</span>
      </div>
      <div class="checkout-stepper-step">
        <span class="checkout-stepper-bar" aria-hidden="true"></span>
        <span class="checkout-stepper-label">完成</span>
      </div>
    </nav>

    <div data-checkout-root></div>
  </div>
</section>

{% endblock %}

{% block extra_scripts %}
{% include "partials/checkout-react-js.html" %}
{% endblock %}
