{% extends "layouts/base.html" %}
{% block extra_css %}
<link rel="stylesheet" href="/static/css/member-app.css?v=1">
{% endblock %}
{% block content %}
<!-- @component partials/view-account.html -->
<section class="account-section" id="view-account">
  <div class="container account-grid">
    <aside class="cfg-summary">
      <h3>我的帳戶</h3>
      <div class="cfg-summary-row"><span class="k">姓名</span><span class="v" id="accName">-</span></div>
      <div class="cfg-summary-row"><span class="k">電話</span><span class="v" id="accPhone">-</span></div>
      <div class="cfg-summary-row"><span class="k">Email</span><span class="v" id="accEmail">-</span></div>
      <div class="cfg-actions cfg-actions--spaced">
        <button type="button" class="btn btn-line" id="logoutBtn">登出</button>
      </div>
    </aside>
    <div>
      <h1 class="account-title">我的訂單進度</h1>
      <div class="orders-list" id="ordersList">
        <div class="skel-order-cards skel-panel" aria-busy="true" id="account-orders-skeleton">
          <div class="skel-order-card"><span class="skel-line skel-line--long"></span><span class="skel-line skel-line--medium"></span></div>
          <div class="skel-order-card"><span class="skel-line skel-line--long"></span><span class="skel-line skel-line--medium"></span></div>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}
{% block extra_scripts %}
<script src="/static/js/order-status.js"></script>
<script src="/static/js/api-client.js"></script>
<script src="/static/js/mvc/core.js"></script>
<script src="/static/js/mvc/models/account-model.js"></script>
<script src="/static/js/mvc/views/account-view.js"></script>
<script src="/static/js/mvc/controllers/account-controller.js"></script>
{% endblock %}
